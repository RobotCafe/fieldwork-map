<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldWork Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --earth: #2C1A0E;
    --bark: #3D2412;
    --moss: #4B6A3B;
    --moss-light: #6B9A55;
    --clay: #C4622D;
    --clay-light: #E07A45;
    --cream: #F5EDD8;
    --fog: #B8C4A8;
    --sand: #E8D5B0;
    --white: #FDFAF4;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--earth);
    color: var(--cream);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bark);
    border-bottom: 3px solid var(--clay);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo h1 {
    font-size: 22px; font-weight: 800;
    letter-spacing: 2px; color: var(--clay-light);
    text-transform: uppercase;
  }
  .logo span { font-size: 24px; }
  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 20px; font-weight: 700;
    color: var(--moss-light); line-height: 1;
  }
  .stat-label {
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--fog);
    margin-top: 2px;
  }

  /* ── FILTERS ── */
  .filters {
    background: var(--bark);
    border-bottom: 1px solid rgba(196,98,45,0.2);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-label {
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--fog);
    white-space: nowrap;
  }
  .filter-chips {
    display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
  }
  .chip {
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
    background: rgba(255,255,255,0.08);
    color: var(--fog);
  }
  .chip.active {
    border-color: currentColor;
    color: var(--cream);
    background: rgba(255,255,255,0.12);
  }
  .chip-all.active { color: var(--clay-light); border-color: var(--clay-light); }

  .date-filters {
    display: flex; gap: 8px; align-items: center; margin-left: auto;
  }
  .date-filters input {
    background: var(--earth);
    border: 1px solid rgba(196,98,45,0.35);
    border-radius: 6px;
    color: var(--cream);
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
  }
  .date-filters input:focus { border-color: var(--clay); }
  .clear-dates {
    background: none; border: none;
    color: var(--fog); cursor: pointer;
    font-size: 12px; padding: 4px 8px;
  }
  .clear-dates:hover { color: var(--clay-light); }

  /* ── MAP ── */
  #map {
    flex: 1;
    position: relative;
  }

  /* ── LOADING ── */
  #loading {
    position: absolute; inset: 0;
    background: var(--earth);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(196,98,45,0.2);
    border-top-color: var(--clay-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--fog); font-size: 14px; letter-spacing: 1px; }

  /* ── POPUP ── */
  .popup-content {
    background: var(--bark) !important;
    color: var(--cream) !important;
    border: 1px solid rgba(196,98,45,0.3) !important;
    border-radius: 10px !important;
    padding: 0 !important;
    min-width: 280px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    overflow: hidden;
  }
  .popup-header {
    background: var(--earth);
    padding: 12px 14px;
    border-bottom: 1px solid rgba(196,98,45,0.2);
  }
  .popup-client {
    font-size: 16px; font-weight: 700; color: var(--cream);
  }
  .popup-business {
    font-size: 12px; color: var(--fog); margin-top: 2px;
  }
  .popup-body { padding: 12px 14px; }
  .popup-row {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 6px;
    font-size: 13px;
  }
  .popup-row-label { color: var(--fog); }
  .popup-row-value { color: var(--cream); font-weight: 500; text-align: right; }
  .popup-duration {
    font-size: 22px; font-weight: 700;
    color: var(--moss-light); font-family: monospace;
    display: block; margin: 8px 0;
  }
  .popup-notes {
    font-size: 12px; color: var(--sand);
    font-style: italic; margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(196,98,45,0.2);
  }
  .popup-photos {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .popup-photo {
    flex: 1; aspect-ratio: 1;
    border-radius: 6px; overflow: hidden;
    background: var(--earth);
    border: 1px solid rgba(196,98,45,0.2);
    text-decoration: none;
    display: block;
  }
  .popup-photo img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .popup-photo-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--fog); font-size: 11px;
    padding: 4px; text-align: center;
  }
  .popup-links {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .popup-link {
    flex: 1; padding: 7px; border-radius: 6px;
    text-align: center; font-size: 12px; font-weight: 600;
    text-decoration: none; transition: opacity 0.2s;
  }
  .popup-link:hover { opacity: 0.8; }
  .popup-link-map {
    background: var(--moss);
    color: var(--white);
  }
  .popup-link-sheet {
    background: rgba(196,98,45,0.2);
    color: var(--clay-light);
    border: 1px solid rgba(196,98,45,0.3);
  }
  .popup-manual {
    font-size: 10px; color: var(--clay);
    margin-top: 6px; text-align: right;
  }

  /* ── LEAFLET OVERRIDES ── */
  .leaflet-popup-content-wrapper {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button {
    color: var(--fog) !important;
    font-size: 18px !important;
    top: 6px !important; right: 8px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--cream) !important; }

  /* ── NO DATA ── */
  #no-data {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: var(--earth); z-index: 50;
  }
  #no-data p { color: var(--fog); font-size: 14px; text-align: center; line-height: 1.6; }
  #no-data .big { font-size: 48px; }
</style>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <span>🌿</span>
    <h1>FieldWork Map</h1>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-value" id="stat-jobs">—</div>
      <div class="stat-label">Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-hours">—</div>
      <div class="stat-label">Hours</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-clients">—</div>
      <div class="stat-label">Clients</div>
    </div>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Client</span>
  <div class="filter-chips" id="clientChips">
    <div class="chip chip-all active" onclick="filterClient('all')">All</div>
  </div>
  <div class="date-filters">
    <span class="filter-label">From</span>
    <input type="date" id="dateFrom" onchange="applyFilters()">
    <span class="filter-label">To</span>
    <input type="date" id="dateTo" onchange="applyFilters()">
    <button class="clear-dates" onclick="clearDates()">✕ Clear</button>
  </div>
</div>

<div id="map">
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading job data…</p>
  </div>
  <div id="no-data">
    <div class="big">📍</div>
    <p>No jobs with GPS data found.<br>Complete a job in the field and sync to see it here.</p>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SHEET_ID = '10PoGzJV0OCHjb4_1921U11UvUj6AxPNfzwW9D_F77Fk';
const MAPS_API_KEY = 'AIzaSyCSLcEx_i5oD_CkPk62k0OiOMOlS2LWtOM';
const SHEET_NAME = 'Jobs';

// ── CLIENT COLOURS ────────────────────────────────────────────
const CLIENT_COLOURS = [
  '#6B9A55', '#E07A45', '#5B8EC4', '#C4622D',
  '#8E6BC4', '#C4A62D', '#2DC4A6', '#C42D6B',
];

// ── MAP SETUP ─────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });

// Satellite layer
L.tileLayer(
  `https://maps.googleapis.com/maps/api/staticmap?center={lat},{lng}&zoom={z}&size=256x256&maptype=hybrid&key=${MAPS_API_KEY}`,
  { attribution: '© Google Maps' }
);

// Use OpenStreetMap satellite alternative (Esri) — no API key needed for tiles
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri',
  maxZoom: 19,
}).addTo(map);

// Hybrid labels overlay
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  attribution: '',
  maxZoom: 19,
  opacity: 0.7,
}).addTo(map);

map.setView([-25.0, 133.0], 5); // Default: Australia

// ── STATE ─────────────────────────────────────────────────────
let allJobs = [];
let markers = [];
let activeClient = 'all';
let clientColourMap = {};

// ── FETCH DATA ────────────────────────────────────────────────
async function loadData() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:N?key=${MAPS_API_KEY}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (!data.values || data.values.length < 2) {
      showNoData(); return;
    }

    const rows = data.values.slice(1); // skip header
    allJobs = rows
      .map(row => ({
        id:           row[0] || '',
        date:         row[1] || '',
        client:       row[2] || '',
        business:     row[3] || '',
        startTime:    row[4] || '',
        endTime:      row[5] || '',
        durationHrs:  parseFloat(row[6]) || 0,
        notes:        row[7] || '',
        startGps:     parseGps(row[8]),
        endGps:       parseGps(row[9]),
        mapLink:      row[10] || '',
        startPhoto:   row[11] || '',
        endPhoto:     row[12] || '',
        manual:       row[13] === 'Yes',
        rawDate:      parseAusDate(row[1]),
      }))
      .filter(j => j.startGps || j.endGps); // only jobs with GPS

    if (allJobs.length === 0) { showNoData(); return; }

    buildClientColours();
    buildClientChips();
    renderMarkers();
    updateStats();
    fitMapToBounds();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    console.error('Failed to load data:', e);
    document.getElementById('loading').innerHTML =
      `<div style="color:#E07A45;text-align:center;padding:20px">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <p>Could not load job data.</p>
        <p style="font-size:12px;margin-top:8px;color:#B8C4A8">Make sure your Sheet is publicly readable.</p>
      </div>`;
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function parseGps(str) {
  if (!str) return null;
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  return { lat: parts[0], lon: parts[1] };
}

function parseAusDate(str) {
  // Parse dd/mm/yyyy or "Mon d MMM yyyy"
  if (!str) return null;
  try {
    if (str.includes('/')) {
      const [d, m, y] = str.split('/');
      return new Date(+y, +m - 1, +d);
    }
    return new Date(str);
  } catch { return null; }
}

function fmtHours(hrs) {
  const h = Math.floor(hrs);
  const m = Math.round((hrs - h) * 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

// ── COLOURS ───────────────────────────────────────────────────
function buildClientColours() {
  const clients = [...new Set(allJobs.map(j => j.client))];
  clients.forEach((c, i) => {
    clientColourMap[c] = CLIENT_COLOURS[i % CLIENT_COLOURS.length];
  });
}

function makeIcon(colour, isEnd) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${colour}" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="5" fill="${isEnd ? 'white' : colour}" stroke="white" stroke-width="2"/>
    ${isEnd ? `<text x="14" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="${colour}">E</text>` : ''}
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -38],
    className: '',
  });
}

// ── MARKERS ───────────────────────────────────────────────────
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = getFiltered();

  filtered.forEach(job => {
    const colour = clientColourMap[job.client] || CLIENT_COLOURS[0];
    const gps = job.startGps || job.endGps;
    if (!gps) return;

    const marker = L.marker([gps.lat, gps.lon], {
      icon: makeIcon(colour, !job.startGps && job.endGps),
    });

    marker.bindPopup(buildPopup(job, colour), {
      maxWidth: 320,
      className: 'fw-popup',
    });

    marker.addTo(map);
    markers.push(marker);

    // If job has both start and end GPS, add end marker too
    if (job.startGps && job.endGps) {
      const endMarker = L.marker([job.endGps.lat, job.endGps.lon], {
        icon: makeIcon(colour, true),
      });
      endMarker.bindPopup(buildPopup(job, colour, true), {
        maxWidth: 320,
        className: 'fw-popup',
      });
      endMarker.addTo(map);
      markers.push(endMarker);

      // Draw line between start and end
      const line = L.polyline(
        [[job.startGps.lat, job.startGps.lon], [job.endGps.lat, job.endGps.lon]],
        { color: colour, weight: 2, opacity: 0.6, dashArray: '5,5' }
      );
      line.addTo(map);
      markers.push(line);
    }
  });

  updateStats(filtered);
}

function buildPopup(job, colour, isEnd) {
  const photoHtml = (job.startPhoto || job.endPhoto) ? `
    <div class="popup-photos">
      ${job.startPhoto ? `<a href="${job.startPhoto}" target="_blank" class="popup-photo" title="Start photo"><img src="${job.startPhoto.replace('/view', '/preview')}" onerror="this.parentElement.innerHTML='<div class=popup-photo-placeholder>📸 Start</div>'"></a>` : ''}
      ${job.endPhoto ? `<a href="${job.endPhoto}" target="_blank" class="popup-photo" title="End photo"><img src="${job.endPhoto.replace('/view', '/preview')}" onerror="this.parentElement.innerHTML='<div class=popup-photo-placeholder>🏁 End</div>'"></a>` : ''}
    </div>` : '';

  const mapsLink = job.startGps
    ? `https://www.google.com/maps/search/?api=1&query=${job.startGps.lat},${job.startGps.lon}`
    : job.mapLink;

  return `
    <div class="popup-content">
      <div class="popup-header" style="border-left: 4px solid ${colour}">
        <div class="popup-client">${job.client}</div>
        ${job.business ? `<div class="popup-business">🏢 ${job.business}</div>` : ''}
      </div>
      <div class="popup-body">
        <span class="popup-duration">${fmtHours(job.durationHrs)}</span>
        <div class="popup-row">
          <span class="popup-row-label">📅 Date</span>
          <span class="popup-row-value">${job.date}</span>
        </div>
        <div class="popup-row">
          <span class="popup-row-label">🕐 Time</span>
          <span class="popup-row-value">${job.startTime}${job.endTime ? ' → ' + job.endTime : ''}</span>
        </div>
        ${job.startGps ? `
        <div class="popup-row">
          <span class="popup-row-label">📍 Start GPS</span>
          <span class="popup-row-value" style="font-family:monospace;font-size:11px">${job.startGps.lat.toFixed(4)}, ${job.startGps.lon.toFixed(4)}</span>
        </div>` : ''}
        ${job.endGps ? `
        <div class="popup-row">
          <span class="popup-row-label">🏁 End GPS</span>
          <span class="popup-row-value" style="font-family:monospace;font-size:11px">${job.endGps.lat.toFixed(4)}, ${job.endGps.lon.toFixed(4)}</span>
        </div>` : ''}
        ${job.notes ? `<div class="popup-notes">📝 ${job.notes}</div>` : ''}
        ${photoHtml}
        <div class="popup-links">
          ${mapsLink ? `<a href="${mapsLink}" target="_blank" class="popup-link popup-link-map">🗺 Open in Maps</a>` : ''}
        </div>
        ${job.manual ? '<div class="popup-manual">Manual entry</div>' : ''}
      </div>
    </div>`;
}

// ── FILTERS ───────────────────────────────────────────────────
function getFiltered() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  return allJobs.filter(job => {
    if (activeClient !== 'all' && job.client !== activeClient) return false;
    if (from && job.rawDate && job.rawDate < new Date(from)) return false;
    if (to && job.rawDate && job.rawDate > new Date(to + 'T23:59:59')) return false;
    return true;
  });
}

function filterClient(client) {
  activeClient = client;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  const chip = document.querySelector(`[data-client="${client}"]`) ||
               document.querySelector('.chip-all');
  if (chip) chip.classList.add('active');
  renderMarkers();
}

function applyFilters() { renderMarkers(); }

function clearDates() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  renderMarkers();
}

function buildClientChips() {
  const clients = [...new Set(allJobs.map(j => j.client))].sort();
  const container = document.getElementById('clientChips');
  container.innerHTML = `<div class="chip chip-all active" onclick="filterClient('all')">All</div>`;
  clients.forEach(client => {
    const colour = clientColourMap[client];
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.client = client;
    chip.style.color = colour;
    chip.textContent = client;
    chip.onclick = () => filterClient(client);
    container.appendChild(chip);
  });
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats(filtered) {
  const jobs = filtered || getFiltered();
  const totalHrs = jobs.reduce((a, j) => a + j.durationHrs, 0);
  const clients = new Set(jobs.map(j => j.client)).size;
  document.getElementById('stat-jobs').textContent = jobs.length;
  document.getElementById('stat-hours').textContent = fmtHours(totalHrs);
  document.getElementById('stat-clients').textContent = clients;
}

// ── MAP FIT ───────────────────────────────────────────────────
function fitMapToBounds() {
  const points = allJobs.flatMap(j => [
    j.startGps ? [j.startGps.lat, j.startGps.lon] : null,
    j.endGps ? [j.endGps.lat, j.endGps.lon] : null,
  ].filter(Boolean));

  if (points.length === 0) return;
  if (points.length === 1) {
    map.setView(points[0], 14);
  } else {
    map.fitBounds(points, { padding: [40, 40] });
  }
}

function showNoData() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('no-data').style.display = 'flex';
}

// ── INIT ──────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
